name: Daily Copilot Metrics Report

on:
  schedule:
    # Runs every day at 7:00 AM UTC
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      team_slug:
        description: >
          Enterprise team slug to generate the report for (e.g. "my-team").
          Leave empty to process ALL enterprise teams (default behaviour).
        required: false
        type: string
      team_head_email:
        description: >
          Email address to send the report to for the specified team slug.
          Used only when team_slug is provided.
        required: false
        type: string

permissions:
  contents: read

jobs:
  send-reports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and email team reports
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          ENTERPRISE_SLUG: ${{ secrets.ENTERPRISE_SLUG }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          TEAM_EMAILS: ${{ secrets.TEAM_EMAILS }}
          # Optional: filter to a single team slug (from workflow_dispatch input)
          TEAM_SLUG: ${{ inputs.team_slug }}
          TEAM_HEAD_EMAIL: ${{ inputs.team_head_email }}
          # Per-team head email addresses (each team head receives only their team's report)
          ACCELERATOR_COPILOT_HEAD_EMAIL: ${{ secrets.ACCELERATOR_COPILOT_HEAD_EMAIL }}
          DELIVERY_COPILOT_HEAD_EMAIL: ${{ secrets.DELIVERY_COPILOT_HEAD_EMAIL }}
          GENESIS_COPILOT_HEAD_EMAIL: ${{ secrets.GENESIS_COPILOT_HEAD_EMAIL }}
          NT_COPILOT_HEAD_EMAIL: ${{ secrets.NT_COPILOT_HEAD_EMAIL }}
          PDG_COPILOT_HEAD_EMAIL: ${{ secrets.PDG_COPILOT_HEAD_EMAIL }}
        run: python enterprise_team_copilot_combined_report.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-metrics-report
          path: "*.csv"
          retention-days: 30
          if-no-files-found: ignore
