name: Daily Copilot Metrics Report

on:
  schedule:
    # Runs every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  generate-report:
    name: Generate Enterprise Team Copilot Report
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Copilot metrics report
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          ENTERPRISE_SLUG: ${{ secrets.ENTERPRISE_SLUG }}
          # Comma-separated list of team slugs to process (each gets its own CSV).
          # Leave empty to process all teams into a single combined CSV.
          #
          # Use pipe (|) within an entry to merge multiple teams into one combined report.
          # Example: "delivery-copilot|accelerator-copilot,nt-copilot"
          #   → one combined CSV for delivery-copilot + accelerator-copilot
          #   → one individual CSV for nt-copilot
          #
          # Secret guidance for combined groups:
          #   - No new secrets are required.
          #   - Both teams' existing email secrets are used as recipients for the merged report.
          #     e.g. DELIVERY_COPILOT_TEAM_EMAIL and ACCELERATOR_COPILOT_TEAM_EMAIL are both
          #     collected and the report is sent to all addresses in both secrets.
          #   - Make sure each team that should receive the combined report has its
          #     <SLUG>_TEAM_EMAIL secret set (slug uppercased + hyphens → underscores + _TEAM_EMAIL).
          ENTERPRISE_TEAM_SLUGS: ${{ secrets.ENTERPRISE_TEAM_SLUGS }}
          # SMTP settings for sending reports by email.
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          # Team head email addresses – two naming schemes are supported.
          #
          # Scheme 1 (preferred): slug-derived name.
          # Derive the secret name from the team slug by uppercasing and replacing
          # hyphens/special characters with underscores, then appending _TEAM_EMAIL.
          # Examples:
          #   slug "accelerator-copilot"  →  ACCELERATOR_COPILOT_TEAM_EMAIL
          #   slug "delivery-copilot"     →  DELIVERY_COPILOT_TEAM_EMAIL
          # Add one entry per team; the script picks the right one automatically.
          ACCELERATOR_COPILOT_TEAM_EMAIL: ${{ secrets.ACCELERATOR_COPILOT_TEAM_EMAIL }}
          DELIVERY_COPILOT_TEAM_EMAIL: ${{ secrets.DELIVERY_COPILOT_TEAM_EMAIL }}
          NT_COPILOT_TEAM_EMAIL: ${{ secrets.NT_COPILOT_TEAM_EMAIL }}
          NSG_COPILOT_TEAM_EMAIL: ${{ secrets.NSG_COPILOT_TEAM_EMAIL }}
          GENESIS_COPILOT_TEAM_EMAIL: ${{ secrets.GENESIS_COPILOT_TEAM_EMAIL }}
          PDG_COPILOT_TEAM_EMAIL: ${{ secrets.PDG_COPILOT_TEAM_EMAIL }}
          #
          # Scheme 2 (legacy / fallback): positional name.
          # Position matches the order of teams in ENTERPRISE_TEAM_SLUGS.
          # Each secret may contain a single address OR a comma-separated list of
          # addresses – the report is delivered to every address in the list.
          # Example: "alice@example.com, bob@example.com"
          # Add TEAM{N}_HEAD_EMAIL secrets in your repository for as many teams as needed.
          TEAM1_HEAD_EMAIL: ${{ secrets.TEAM1_HEAD_EMAIL }}
          TEAM2_HEAD_EMAIL: ${{ secrets.TEAM2_HEAD_EMAIL }}
          TEAM3_HEAD_EMAIL: ${{ secrets.TEAM3_HEAD_EMAIL }}
          TEAM4_HEAD_EMAIL: ${{ secrets.TEAM4_HEAD_EMAIL }}
          TEAM5_HEAD_EMAIL: ${{ secrets.TEAM5_HEAD_EMAIL }}
          TEAM6_HEAD_EMAIL: ${{ secrets.TEAM6_HEAD_EMAIL }}
          TEAM7_HEAD_EMAIL: ${{ secrets.TEAM7_HEAD_EMAIL }}
          TEAM8_HEAD_EMAIL: ${{ secrets.TEAM8_HEAD_EMAIL }}
          TEAM9_HEAD_EMAIL: ${{ secrets.TEAM9_HEAD_EMAIL }}
          TEAM10_HEAD_EMAIL: ${{ secrets.TEAM10_HEAD_EMAIL }}
        run: python enterprise_team_copilot_combined_report.py

      - name: Upload CSV report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-metrics-report-${{ github.run_id }}
          path: "enterprise_team_*_copilot_*.csv"
          retention-days: 90
